    *{box-sizing:border-box;margin:0;padding:0;}

    .fade-in{animation:fi .2s ease;}
    @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .nav-active{color:var(--accent);border-bottom:2px solid var(--accent);}
    .nav-off{color:#9CA3AF;border-bottom:2px solid transparent;}
    .pill{display:inline-block;background:#DBEAFE;color:#1D4ED8;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}

    .pill-orange{background:#FEF3C7;color:#92400E;}
    .card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05);}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;background:none;border:none;cursor:pointer;margin-bottom:16px;padding:0;}
    .back-btn:hover{color:var(--text);}
    /* ── Home page sections (Lifestacks-style) ── */
    .hero{background:linear-gradient(135deg,#1C1C2E 0%,#2D1B69 50%,#1C1C2E 100%);color:#fff;padding:80px 24px 72px;position:relative;overflow:hidden;}
    .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(245,158,11,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(139,92,246,.15) 0%,transparent 60%);pointer-events:none;}
    .hero-pill{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 16px;border-radius:999px;margin-bottom:24px;}
    .ls-section{max-width:700px;margin:0 auto;padding:64px 24px;}
    .ls-section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px;}
    .ls-section h2{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-0.5px;line-height:1.15;margin-bottom:20px;color:var(--text);}
    .ls-section p{font-size:1.05rem;color:var(--muted);line-height:1.75;margin-bottom:18px;}
    .ls-section p strong{color:var(--text);}
    .section-white{background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .section-light{background:var(--bg);}
    .section-dark{background:linear-gradient(135deg,#0D1B2E 0%,#0f2d1e 100%);color:#fff;}
    .quote-block{border-left:4px solid var(--accent);padding:16px 20px;background:#F0FDF4;border-radius:0 12px 12px 0;margin:20px 0;}
    .principle-row{display:flex;gap:16px;margin-bottom:24px;align-items:flex-start;}

</head>

<script>
// ── FIREBASE CONFIG ────────────────────────────────────────────
const FB_CFG = {
  apiKey: "AIzaSyCynk-RlZWs6RhtePLPjwULifvT6RY6ZG8",

};

// ── ACCESS CODES ───────────────────────────────────────────────
var PHASE1_CODE = 'J4KX9M';
var PHASE2_CODE = 'STRONG7'; // ← Change this when Phase 2 is released
var PHASE2_MIN_SESSIONS = 6;

// ── STATE ──────────────────────────────────────────────────────
var fbAuth, db;
var uid = null;
var authResolved = false;
var cachedSessions = [];
var userProfile = {};
var pendingView = null;

var appState = {
  view: 'loading',
  program: PROGRAMS[0],
  workout: null,
  sessionId: null,
  progressExercise: null,
  codeError: null,
};

// ── PROFILE HELPERS ────────────────────────────────────────────
function isUnlocked(phase) {
  if (phase === 'phase1') return !!userProfile.phase1Unlocked;
  if (phase === 'phase2') return !!userProfile.phase2Unlocked;
  return false;
}

// ── SESSION STORAGE ────────────────────────────────────────────
function getSessions() { return cachedSessions; }

async function saveSessionData(s) {
  cachedSessions.unshift(s);
  if (db && uid) {
    await db.collection('users').doc(uid).collection('sessions').doc(String(s.id)).set(s);
  } else {
    var all = JSON.parse(localStorage.getItem('cb_sessions') || '[]');
    all.unshift(s);
    localStorage.setItem('cb_sessions', JSON.stringify(all));
  }
}

async function deleteSessionData(id) {
  cachedSessions = cachedSessions.filter(function(s){ return s.id !== id; });
  if (db && uid) {
    await db.collection('users').doc(uid).collection('sessions').doc(String(id)).delete();
  } else {
    var all = JSON.parse(localStorage.getItem('cb_sessions') || '[]')
      .filter(function(s){ return s.id !== id; });
    localStorage.setItem('cb_sessions', JSON.stringify(all));
  }
}

// ── CODE UNLOCK ────────────────────────────────────────────────
async function unlockPhase(code) {
  var c = code.trim().toUpperCase();
  if (c === PHASE1_CODE) {
    userProfile.phase1Unlocked = true;
    if (db && uid) {
      await db.collection('users').doc(uid).set({phase1Unlocked: true}, {merge: true});
    } else {
      localStorage.setItem('cb_phase1', '1');
    }
    return 'phase1';
  }
  if (c === PHASE2_CODE) {
    var p1Count = cachedSessions.filter(function(s){ return s.phase === 'Phase 1'; }).length;
    if (p1Count < PHASE2_MIN_SESSIONS) return 'phase2-locked';
    userProfile.phase2Unlocked = true;
    if (db && uid) {
      await db.collection('users').doc(uid).set({phase2Unlocked: true}, {merge: true});
    }
    return 'phase2';
  }
  return null;
}

// ── VIDEO ──────────────────────────────────────────────────────
function openVideo(name, url) { window.open(url, '_blank'); }

// ── NAVIGATION ─────────────────────────────────────────────────
function showView(v) {
  if (v === 'home') {
    appState.view = 'home';
    updateNav('home');
    render();
    return;
  }
  if (v === 'auth') {
    appState.view = 'auth';
    render();
    return;
  }
  // Protected views need auth
  if (!uid) {
    pendingView = v;
    appState.view = 'auth';
    render();
    return;
  }
  // Protected views need code
  if (!isUnlocked('phase1')) {
    pendingView = v;
    appState.codeError = null;
    appState.view = 'lock';
    render();
    return;
  }
  appState.view = v;
  updateNav(v);
  render();
}

function updateNav(v) {
  ['home','programs','progress','history'].forEach(function(id) {
    var el = document.getElementById('nav-' + id);
    if (!el) return;
    el.className = (id === v) ? 'nav-active' : 'nav-off';
  });
}

// ── SIGN OUT ───────────────────────────────────────────────────
function signOut() {
  if (fbAuth) {
    fbAuth.signOut().then(function() {
      uid = null;
      userProfile = {};
      cachedSessions = [];
      appState.view = 'home';
      updateNav('home');
      render();
    });
  }
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  var app = document.getElementById('app');
  var html = '';
  var v = appState.view;
  if      (v === 'loading')  html = viewLoading();
  else if (v === 'auth')     html = viewAuth();
  else if (v === 'lock')     html = viewLock();
  else if (v === 'home')     html = viewHome();
  else if (v === 'programs') html = viewPrograms();
  else if (v === 'workouts') html = viewWorkouts();
  else if (v === 'active')   html = viewActive();
  else if (v === 'history')  html = viewHistory();
  else if (v === 'detail')   html = viewDetail();
  else if (v === 'progress') html = viewProgress();
  app.innerHTML = html;
  app.className = 'fade-in';
  void app.offsetWidth;
  attachListeners();
  if (v === 'progress') setTimeout(drawChart, 80);
}

function attachListeners() {
  // Code entry
  var input  = document.getElementById('access-input');
  var submit = document.getElementById('access-submit');
  if (submit && input) {
    submit.addEventListener('click', handleCodeSubmit);
    input.addEventListener('keydown', function(e){ if (e.key==='Enter') handleCodeSubmit(); });
    setTimeout(function(){ input.focus(); }, 80);
  }
  // Google sign-in
  var googleBtn = document.getElementById('google-signin');
  if (googleBtn) {
    googleBtn.addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      fbAuth.signInWithPopup(provider).catch(function(e){ console.error(e); });
    });
  }
}

async function handleCodeSubmit() {
  var input = document.getElementById('access-input');
  var code = (input ? input.value : '') || '';
  var result = await unlockPhase(code);
  if (result === 'phase1' || result === 'phase2') {
    appState.codeError = null;
    var dest = pendingView || 'programs';
    pendingView = null;
    showView(dest);
  } else if (result === 'phase2-locked') {
    appState.codeError = 'need-sessions';
    render();
  } else {
    appState.codeError = 'wrong';
    render();
  }
}

// ── BOOT ───────────────────────────────────────────────────────
async function boot(user) {
  uid = user ? user.uid : null;
  if (db && uid) {
    try {
      var profileDoc = await db.collection('users').doc(uid).get();
      userProfile = profileDoc.exists ? profileDoc.data() : {};
    } catch(e) { userProfile = {}; }
    try {
      var snap = await db.collection('users').doc(uid).collection('sessions')
        .orderBy('date', 'desc').get();
      cachedSessions = snap.docs.map(function(d){ return d.data(); });
    } catch(e) { cachedSessions = []; }
  } else {
    userProfile = { phase1Unlocked: localStorage.getItem('cb_phase1') === '1' };
    cachedSessions = JSON.parse(localStorage.getItem('cb_sessions') || '[]');
  }
  authResolved = true;
  appState.view = 'home';
  updateNav('home');
  render();
}

async function completeWorkout() {
  var w = appState.workout;
  var exercises = [];
  w.groups.forEach(function(group) {
    if (group.type !== 'working') return;
    group.exercises.forEach(function(ex, ei) {
      var key = group.name.replace(/\s/g,'') + '-' + ei;
      var sets = [];
      for (var si = 0; si < ex.sets; si++) {
        sets.push({
          weight: (document.getElementById('w-' + key + '-' + si)||{}).value || '',
          reps:   (document.getElementById('r-' + key + '-' + si)||{}).value || '',
        });
      }
      exercises.push({group:group.name, name:ex.name, prescribed:ex.sets+'×'+ex.reps, sets:sets});
    });
  });
  var s = {
    id: Date.now(),
    date: new Date().toISOString(),
    program: appState.program.name,
    workout: w.name,
    phase: w.phase,
    exercises: exercises,
    notes: (document.getElementById('session-notes')||{}).value || '',
  };
  var btn = document.querySelector('button[onclick="completeWorkout()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  await saveSessionData(s);
  showView('history');
}

function viewDetail_go(id) {

function viewDetail() {
  var s = getSessions().find(function(x){ return x.id === appState.sessionId; });
  if (!s) return viewHistory();
  var d = new Date(s.date);
  var dateStr = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var isP2 = s.phase === 'Phase 2';
  var headerColor = isP2 ? '#FEF3C7' : '#ECFDF5';
  var headerBorder = isP2 ? '1px solid #FDE68A' : '1px solid #A7F3D0';
  var pillCls = isP2 ? 'pill-orange' : 'pill-green';

  var currentGroup = '';
  var exHtml = '';
  s.exercises.forEach(function(ex) {
    if (ex.group !== currentGroup) {
      if (currentGroup) exHtml += '</div>';
      exHtml += '<div class="card"><h3 style="font-weight:800;letter-spacing:-0.3px;font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;">' + ex.group + '</h3>';
      currentGroup = ex.group;
    }
    var hasData = ex.sets.some(function(st){ return st.weight||st.reps; });
    exHtml += '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #F3F4F6;">'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">'
      + '<p style="font-size:13px;font-weight:600;color:#0D1B2E;">' + ex.name + '</p>'
      + '<span style="font-size:11px;color:#9CA3AF;">' + ex.prescribed + '</span>'
      + '</div>'
      + (hasData
          ? ex.sets.map(function(set,i){ return (set.weight||set.reps)
              ? '<div style="display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:3px;">'
                + '<span style="font-size:11px;color:#9CA3AF;width:36px;">Set ' + (i+1) + '</span>'
                + '<span style="font-weight:600;color:#0D1B2E;">' + (set.weight?set.weight+' kg':'—') + '</span>'
                + '<span style="color:#D1D5DB;">×</span>'
                + '<span style="font-weight:600;color:#0D1B2E;">' + (set.reps?set.reps+' reps':'—') + '</span>'
                + '</div>' : ''; }).join('')
          : '<p style="font-size:11px;color:#9CA3AF;font-style:italic;">No data recorded</p>')
      + '</div>';
  });
  if (currentGroup) exHtml += '</div>';
  if (s.notes) {
    exHtml += '<div class="card"><h3 style="font-weight:800;letter-spacing:-0.3px;font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Notes</h3>'
      + '<p style="font-size:13px;color:#4B5563;">' + s.notes + '</p></div>';
  }
  exHtml += '<button onclick="deleteSession(' + s.id + ')" style="width:100%;border:1px solid #FCA5A5;color:#EF4444;font-size:13px;font-weight:600;padding:12px;border-radius:16px;background:none;cursor:pointer;margin-bottom:8px;">Delete Session</button>';

  return '<div style="background:var(--bg);min-height:100vh;padding-bottom:80px;">'
    + '<div style="background:' + headerColor + ';border-bottom:' + headerBorder + ';padding:36px 16px 24px;max-width:480px;margin:0 auto;">'
    + '<button onclick="showView(\'history\')" class="back-btn"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>History</button>'
    + '<span class="pill ' + pillCls + '" style="margin-bottom:6px;display:inline-block;">' + s.program + ' · ' + s.phase + '</span>'
    + '<h1 style="font-weight:800;letter-spacing:-0.3px;font-size:34px;font-weight:700;color:#111827;margin-bottom:2px;">' + s.workout + '</h1>'
    + '<p style="color:rgba(0,0,0,.5);font-size:13px;">' + dateStr + '</p>'
    + '</div>'
    + '<div style="padding:8px 16px 0;max-width:480px;margin:0 auto;">' + exHtml + '</div></div>';
}

function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  deleteSessionData(id).then(function(){ showView('history'); });
}

function viewProgress() {
  var sessions = getSessions();

  sessions.forEach(function(s){ s.exercises.forEach(function(e){ if (allEx.indexOf(e.name)<0) allEx.push(e.name); }); });

  var header = '<div style="padding:40px 16px 24px;max-width:480px;margin:0 auto;">'
    + '<h1 style="font-weight:800;letter-spacing:-0.3px;font-size:34px;font-weight:700;color:#111827;margin-bottom:4px;">Progress</h1>'
    + '<p style="color:rgba(0,0,0,.5);font-size:13px;">Best weight per session for each exercise.</p>'
    + '</div>';

  if (!allEx.length) {
    return '<div style="background:var(--bg);min-height:100vh;padding-bottom:80px;">' + header
      + '<div style="padding:0 16px;max-width:480px;margin:0 auto;text-align:center;padding-top:80px;color:#9CA3AF;">'
      + '<svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;opacity:.3;display:block;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>'
      + '<p style="font-weight:600;">No data yet.</p><p style="font-size:13px;margin-top:4px;">Log a few sessions to track your progress.</p></div></div>';
  }

  if (!appState.progressExercise) appState.progressExercise = allEx[0];
  var sel = appState.progressExercise;
  var exData = sessions
    .filter(function(s){ return s.exercises.some(function(e){ return e.name===sel; }); })
    .map(function(s){
      var ex = s.exercises.find(function(e){ return e.name===sel; });
      var max = Math.max.apply(null, ex.sets.map(function(st){ return parseFloat(st.weight)||0; }));
      return { date: new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}), weight: max };
    }).reverse();

  var opts = allEx.map(function(e){
    return '<option value="' + e + '"' + (e===sel?' selected':'') + '>' + e + '</option>';
  }).join('');

  var rows = exData.map(function(d){
    return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #F3F4F6;">'
      + '<span style="color:#6B7280;">' + d.date + '</span>'
      + '<span style="font-weight:600;color:#0D1B2E;">' + (d.weight>0?d.weight+' kg':'—') + '</span>'
      + '</div>';
  }).join('');

  return '<div style="background:var(--bg);min-height:100vh;padding-bottom:80px;">' + header
    + '<div style="padding:0 16px;max-width:480px;margin:0 auto;">'
    + '<div class="card"><label style="display:block;font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Exercise</label>'
    + '<select onchange="appState.progressExercise=this.value;render();" style="width:100%;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px;font-size:13px;color:#0D1B2E;outline:none;">' + opts + '</select></div>'
    + (exData.length > 1
        ? '<div class="card"><canvas id="progress-chart"></canvas></div>'
        : '<div class="card" style="text-align:center;color:#9CA3AF;font-size:13px;padding:32px;">Log 2+ sessions with this exercise to see a chart.</div>')
    + '<div class="card"><h3 style="font-weight:800;letter-spacing:-0.3px;font-size:12px;color:#059669;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;">Session Log</h3>' + rows + '</div>'
    + '</div></div>';
}

function drawChart() {
  var canvas = document.getElementById('progress-chart');
  if (!canvas || !appState.progressExercise) return;
  var sel = appState.progressExercise;
  var exData = getSessions()
    .filter(function(s){ return s.exercises.some(function(e){ return e.name===sel; }); })
    .map(function(s){
      var ex = s.exercises.find(function(e){ return e.name===sel; });
      var max = Math.max.apply(null, ex.sets.map(function(st){ return parseFloat(st.weight)||0; }));
      return { date: new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}), weight: max };
    }).reverse();
  new Chart(canvas, {
    type:'line',
    data:{
      labels: exData.map(function(d){ return d.date; }),
      datasets:[{
        label:'Best weight (kg)',
        data: exData.map(function(d){ return d.weight; }),
        borderColor:'#059669',backgroundColor:'rgba(5,150,105,0.08)',
        borderWidth:2,pointBackgroundColor:'#059669',pointRadius:4,tension:0.3,fill:true,
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:false,ticks:{font:{size:11}},grid:{color:'#F3F4F6'}},
        x:{ticks:{font:{size:11}},grid:{display:false}},
      }
    }
  });
}
</script>
</body>
</html>
